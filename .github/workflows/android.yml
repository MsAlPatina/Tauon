name: Build Tauon Android APK

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip git zip unzip \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev cmake

      - name: Install Python deps
        run: |
          pip3 install --upgrade pip
          pip3 install cython==0.29.36 buildozer

      - name: Install Android SDK manually + accept licenses
        run: |
          mkdir -p $HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk

          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk

          yes | sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Force license acceptance (backup method)
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          yes | sdkmanager --licenses || true

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tauon-apk
          path: bin/*.apk
